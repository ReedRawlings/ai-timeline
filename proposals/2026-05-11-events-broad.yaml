- title: "Anthropic's ARR Hits $30B, Surpassing OpenAI for First Time"
  date: "2026-04-07T09:00:00-07:00"
  description: "Anthropic reported a $30 billion annualized revenue run rate, overtaking OpenAI's roughly $24–25 billion ARR—the first time any competitor had surpassed OpenAI in revenue. CEO Dario Amodei disclosed 80x annualized growth in Q1 2026, tracing a trajectory from $87 million run rate in January 2024 to $1 billion by December 2024, $9 billion at end-of-2025, and $30 billion in April 2026. More than 1,000 enterprise customers were each spending over $1 million per year on Claude. Anthropic simultaneously disclosed plans for a potential IPO as early as October 2026."
  tags: ["Corporate", "Economic"]
  organizations: ["Anthropic"]
  impact_areas: ["Market Competition", "Enterprise AI"]
