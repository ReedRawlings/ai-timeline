- title: "Google Plans $40 Billion Investment in Anthropic"
  date: "2026-04-24T09:00:00-07:00"
  description: "Google announced plans to invest up to $40 billion in Anthropic—$10 billion in immediate cash at a $350 billion valuation, with the remaining $30 billion contingent on performance milestones. The deal also included a commitment to deliver five gigawatts of computing power to Anthropic across a five-year window through Google Cloud, with the door open to several additional gigawatts. The investment elevated Anthropic's total external funding to a scale previously unseen for an AI safety-focused lab and came the same day OpenAI released GPT-5.5, underscoring the arms-race pace of 2026 AI investment."
  tags: ["Corporate", "Economic", "Partnership"]
  organizations: ["Google", "Anthropic"]
  impact_areas: ["Market Competition", "Enterprise AI", "Hardware"]
