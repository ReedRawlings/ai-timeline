- title: "Sakana AI Scientist Published in Nature"
  date: "2026-03-26T09:00:00+00:00"
  description: "Sakana AI's paper 'The AI Scientist: Towards Fully Automated AI Research' was published in Nature on March 26, 2026, after the system's AI-generated work passed rigorous human peer review. The AI Scientist v2 autonomously generates research ideas, searches literature, designs and runs experiments via parallelized agentic tree search, and writes complete LaTeX papers—the first fully AI-generated research to clear a formal peer-review process at a top-tier scientific journal. A clear scaling law was observed: as underlying models improve, paper quality improves correspondingly, raising direct questions about the pace of automated scientific progress."
