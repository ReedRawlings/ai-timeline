- title: "Pentagon Clears 8 AI Firms for Classified Networks, Bars Anthropic"
  date: "2026-05-01T09:00:00-07:00"
  description: "The Pentagon announced agreements with SpaceX, OpenAI, Google, NVIDIA, Reflection AI, Microsoft, Oracle, and Amazon Web Services to deploy their AI products on Impact Level 6 and IL7 classified defense networks via the GenAI.mil platform. Notably absent was Anthropic, which the Trump administration had designated a supply chain risk after the company refused to allow its models to be used for autonomous weapons or domestic surveillance—demands Anthropic said were incompatible with its safety commitments. The announcement was the first time frontier AI models were formally cleared for use on the U.S. military's most sensitive classified networks, and Anthropic's blacklisting set a visible precedent: labs that hold firm on safety guardrails in warfare applications can be excluded from major government contracts."
  tags: ["Policy", "Corporate", "Safety"]
  organizations: ["OpenAI", "Google", "NVIDIA", "Microsoft", "SpaceX", "Amazon", "Oracle"]
  impact_areas: ["Regulation", "Ethics", "Enterprise AI"]
