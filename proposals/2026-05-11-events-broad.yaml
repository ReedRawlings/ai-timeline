  organizations: ["Sakana AI"]
  impact_areas: ["Research", "Language Models"]
  link: "https://sakana.ai/ai-scientist-nature/"

- title: "OpenAI Closes $122B Series D at $852B Valuation"
  date: "2026-03-31T09:00:00-07:00"
  description: "OpenAI closed a $122 billion funding round at a post-money valuation of $852 billion—the largest private funding round in history by a wide margin. Amazon invested $50 billion, Nvidia and SoftBank each put in $30 billion, and for the first time OpenAI extended participation to retail investors through bank channels, raising $3 billion from individuals. The single deal absorbed roughly 41% of Q1 2026 AI funding. At the time of closing, ChatGPT had more than 900 million weekly active users and over 50 million subscribers, with revenue crossing $2 billion per month."
