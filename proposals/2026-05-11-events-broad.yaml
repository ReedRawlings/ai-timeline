- title: "OpenAI Announces Sora Shutdown"
  date: "2026-03-24T09:00:00-07:00"
  description: "OpenAI announced it would shut down the Sora video generation app on April 26, 2026, with the API to follow on September 24. Citing unsustainable inference costs per generated minute, the company framed the decision as a strategic pivot away from consumer creative tools toward coding and enterprise products. The shutdown marked the first time OpenAI retired a flagship product rather than iterating on it, signaling a broader industry reckoning with the economics of video AI."
