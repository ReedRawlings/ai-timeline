- title: "Anthropic Unveils Claude Mythos and Project Glasswing"
  date: "2026-04-07T09:00:00-07:00"
  description: "Anthropic announced Project Glasswing, a closely controlled program in which Claude Mythos Preview—its most capable and unreleased frontier model—was used to autonomously discover thousands of previously unknown zero-day vulnerabilities in every major operating system and every major web browser. In one case, Mythos Preview chained four vulnerabilities into a browser exploit that escaped both renderer and OS sandboxes; in another, it fully autonomously found and exploited a 17-year-old remote code execution bug in FreeBSD, gaining root from an unauthenticated user anywhere on the internet. Citing dual-use risk, Anthropic declined to release the model publicly, instead giving access only to a closed set of partners—AWS, Apple, Broadcom, Cisco, CrowdStrike, Google, JPMorgan Chase, the Linux Foundation, Microsoft, NVIDIA, and Palo Alto Networks—to secure critical software. The announcement was widely described as crossing the 'autonomous offensive security threshold' for AI."
  tags: ["Safety", "Research", "Technical"]
  organizations: ["Anthropic", "AWS", "Apple", "Google", "Microsoft", "NVIDIA", "CrowdStrike"]
