- title: "Apple Plans to Open iOS 27 to Third-Party AI Providers"
  date: "2026-05-05T09:00:00-07:00"
  description: "Reports emerged that Apple is internally testing an 'Extensions' framework for iOS 27, iPadOS 27, and macOS 27 that would allow users to route Apple Intelligence requests—including Siri, Writing Tools, and text generation—to third-party AI models like Google Gemini, Anthropic Claude, and OpenAI ChatGPT. The move would end ChatGPT's exclusive position as Apple's default external AI and give users a choice of AI provider at the system level for the first time. Apple is reportedly already testing integrations with Google and Anthropic ahead of WWDC, which kicks off June 8."
