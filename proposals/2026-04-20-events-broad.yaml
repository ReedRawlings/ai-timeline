- title: "Sakana AI Scientist Paper Published in Nature"
  date: "2026-03-26T09:00:00+00:00"
  tags: ["Research", "Technical"]
  organizations: ["Sakana AI"]
  impact_areas: ["Research", "Language Models"]
  key_figures: ["Jeff Clune", "Jakob Foerster"]
  link: "https://sakana.ai/ai-scientist-nature/"
  description: "Sakana AI's 'The AI Scientist' became the first fully autonomous AI research system to have a paper accepted by a peer-reviewed journal when Nature published its work on automated scientific discovery. The system autonomously generates novel research ideas, searches relevant literature, designs and runs experiments via parallelized agentic tree search, and writes the full paper in LaTeX — with no human input after the initial prompt. One of its three generated papers previously reached the acceptance bar at an ICLR workshop track; the Nature publication marked AI's first full crossing of the peer-review threshold at a top-tier scientific journal."

- title: "New York Governor Signs Final RAISE Act for Frontier AI Models"
  date: "2026-03-27T09:00:00-04:00"
  tags: ["Policy", "Safety"]
  impact_areas: ["Regulation", "Ethics", "Enterprise AI"]
  key_figures: ["Kathy Hochul"]
  link: "https://www.governor.ny.gov/news/governor-hochul-signs-nation-leading-legislation-require-ai-frameworks-ai-frontier-models"
  description: "New York Governor Kathy Hochul signed chapter amendments finalizing the Responsible AI Safety and Education (RAISE) Act — the first U.S. state law requiring frontier AI developers to create and publicly disclose safety protocols, report incidents to regulators within 72 hours, and submit to oversight by a new office within the Department of Financial Services. The law applies to developers with $500M+ in revenue operating models trained on more than 10²⁶ FLOPs at compute costs exceeding $100M, and carries civil penalties starting at $1M per violation, rising to $3M for repeat offenses. It takes effect January 1, 2027, joining California's SB 53 as the only state-level frontier AI regulations with genuine enforcement teeth."

- title: "OpenAI Closes $122B Round at $852B Valuation, Opens to Retail Investors"
  date: "2026-03-31T09:00:00-07:00"
  tags: ["Economic", "Corporate"]
  organizations: ["OpenAI"]
  impact_areas: ["Market Competition", "Enterprise AI"]
  key_figures: ["Sam Altman"]
  link: "https://openai.com/index/accelerating-the-next-phase-ai/"
  description: "OpenAI officially closed its $122 billion funding round at an $852 billion valuation — up from the $110 billion and $730 billion pre-money figures announced in February — after adding $3 billion from individual retail investors through private placements arranged by three banks, marking the first time a pre-IPO AI company of this scale opened equity access to individuals. The round, backed by more than 25 institutional investors including SoftBank, Amazon, Nvidia, Andreessen Horowitz, Sequoia, and Thrive Capital, set an all-time record for a private technology fundraise. OpenAI said business revenue now makes up 40% of total revenue and is on track to reach parity with consumer by year-end, positioning the company for a projected $1 trillion IPO valuation."

- title: "Oracle Lays Off 30,000 to Fund AI Data Center Buildout"
  date: "2026-03-31T09:00:00-07:00"
  tags: ["Economic", "Corporate"]
  organizations: ["Oracle"]
  impact_areas: ["Enterprise AI", "Hardware", "Market Competition"]
  key_figures: ["Larry Ellison"]
  link: "https://www.cnbc.com/2026/03/31/oracle-layoffs-ai-spending.html"
  description: "Oracle confirmed it was cutting approximately 30,000 employees — roughly 18% of its global workforce — to free up $8–10 billion in annual cash flow to fund a $50 billion AI data center capex program, $15 billion more than the company had guided Wall Street just months earlier. Workers in the US, India, Canada, and Mexico received termination emails with no advance notice from HR or managers, and the company immediately redirected savings into fulfilling $553 billion in remaining performance obligations — up 325% year-over-year — driven almost entirely by large AI infrastructure contracts. The single-company headcount reduction, executed simultaneously with a bond-financed debt load of $58 billion taken on in two months, became the starkest example yet of the infrastructure arms race trading white-collar jobs for data center steel."
