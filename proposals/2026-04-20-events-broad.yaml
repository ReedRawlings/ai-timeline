- title: "OpenAI Acquires Tech Talk Show TBPN"
  date: "2026-04-02T09:00:00-07:00"
  tags: ["Corporate", "Social"]
  organizations: ["OpenAI"]
  impact_areas: ["Public Perception", "Market Competition"]
  key_figures: ["Sam Altman"]
  link: "https://openai.com/index/openai-acquires-tbpn/"
  description: "OpenAI acquired TBPN — Technology Business Programming Network — a live weekday founder-led tech talk show on track for $30M in annual revenue, in the company's first acquisition of a media property. TBPN, hosted by Jordi Hays and John Coogan, had become the central daily venue where AI builders and investors discuss the industry; OpenAI said the deal was about shaping the conversation 'where it's actually happening' rather than creating a competing vehicle. TBPN will operate with full editorial independence and be housed within OpenAI's strategy organization. Critics noted the acquisition raised questions about the boundary between media and the companies media covers, as an AI lab became the owner of the forum where AI labs are discussed."

- title: "Anthropic Reveals Claude Mythos Preview, Withholds from Public Over Cybersecurity Risk"
  date: "2026-04-07T09:00:00-07:00"
  tags: ["Model", "Safety", "Technical"]
  organizations: ["Anthropic", "Amazon", "Microsoft", "Google", "Apple", "Nvidia", "Cisco", "CrowdStrike", "JPMorganChase", "Broadcom"]
  models: ["Claude Mythos"]
  impact_areas: ["Language Models", "Ethics", "Enterprise AI", "Research"]
  key_figures: ["Dario Amodei"]
  link: "https://fortune.com/2026/04/07/anthropic-claude-mythos-model-project-glasswing-cybersecurity/"
  description: "Anthropic unveiled Claude Mythos Preview — its most powerful model ever, described as 'strikingly capable at computer security tasks' — and simultaneously announced it would not release it publicly, citing the risk that its autonomous offensive cyber capabilities would give attackers unprecedented leverage before defenses could be built. Instead, under Project Glasswing, Anthropic gave preview access exclusively to a coalition of AWS, Apple, Broadcom, Cisco, CrowdStrike, Google, JPMorganChase, Microsoft, and Nvidia for defensive security work. In the weeks before the announcement, Mythos Preview had autonomously identified and fully exploited thousands of zero-day vulnerabilities across every major operating system and browser — including a 17-year-old remote code execution flaw in FreeBSD (CVE-2026-4747) that allowed unauthenticated root access over NFS, a bug that had survived nearly two decades of human security review. The announcement marked the first time a major AI lab publicly held back a frontier model on the grounds that deploying it would cause net harm."

